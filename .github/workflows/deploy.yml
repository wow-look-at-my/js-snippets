name: CI / Deploy

on:
  push:
    branches:
      - master
  pull_request:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: node build.js

  deploy:
    needs: build
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Build
        run: node build.js

      - name: Deploy to gh-pages
        run: |
          touch dist/.nojekyll

          git fetch origin gh-pages:gh-pages 2>/dev/null || true
          git checkout --orphan _deploy
          git rm -rf .

          cp -r dist/* .
          cp dist/.nojekyll .

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy from master (${GITHUB_SHA::7})"
          git push origin HEAD:gh-pages --force
